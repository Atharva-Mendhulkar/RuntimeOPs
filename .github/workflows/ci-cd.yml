name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies for linting
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8

    - name: Run Black formatter check
      run: black --check src tests

    - name: Run Isort import order check
      run: isort --check-only src tests

    - name: Run Flake8 linter
      run: flake8 src tests --max-line-length=100 --exclude=bob_pb2.py,bob_pb2_grpc.py

  unit-and-integration-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Poetry and dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install poetry
        poetry config virtualenvs.create false
        poetry install --no-interaction --no-root

    - name: Verify setuptools
      run: python -c "import pkg_resources; print('pkg_resources OK')"

    - name: Run Pytest suite
      run: |
        PYTHONPATH=src pytest tests/integration/test_endpoints.py tests/validation/test_validation_scenarios.py -p no:cacheprovider --override-ini="addopts="

  verify-docker-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build production Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile
        push: false
        tags: runtimeops:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
