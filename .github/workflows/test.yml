name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  POETRY_VERSION: '1.7.0'

jobs:
  # ============================================================================
  # Unit Tests
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pypoetry
            ~/.virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: |
          cd bob
          poetry install --with dev
      
      - name: Run unit tests
        run: |
          cd bob
          poetry run pytest tests/unit -v --cov=bob --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./bob/coverage.xml
          flags: unit
          name: unit-tests

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: bob_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: bob_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      neo4j:
        image: neo4j:5.13
        env:
          NEO4J_AUTH: neo4j/test_password
          NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
        ports:
          - 7687:7687
          - 7474:7474
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      
      weaviate:
        image: semitechnologies/weaviate:1.24.0
        env:
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
          PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
        ports:
          - 8080:8080
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: |
          cd bob
          poetry install --with dev
      
      - name: Wait for services
        run: |
          sleep 10
      
      - name: Run integration tests
        env:
          TEST_POSTGRES_HOST: localhost
          TEST_POSTGRES_PORT: 5432
          TEST_POSTGRES_DB: bob_test
          TEST_POSTGRES_USER: bob_test
          TEST_POSTGRES_PASSWORD: test_password
          TEST_NEO4J_URI: bolt://localhost:7687
          TEST_NEO4J_USER: neo4j
          TEST_NEO4J_PASSWORD: test_password
          TEST_REDIS_HOST: localhost
          TEST_REDIS_PORT: 6379
          TEST_WEAVIATE_URL: http://localhost:8080
        run: |
          cd bob
          poetry run pytest tests/integration -v --cov=bob --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./bob/coverage.xml
          flags: integration
          name: integration-tests

  # ============================================================================
  # E2E Tests
  # ============================================================================
  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: bob_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: bob_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      neo4j:
        image: neo4j:5.13
        env:
          NEO4J_AUTH: neo4j/test_password
          NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
        ports:
          - 7687:7687
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
      
      weaviate:
        image: semitechnologies/weaviate:1.24.0
        env:
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
        ports:
          - 8080:8080
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: |
          cd bob
          poetry install --with dev
      
      - name: Wait for services
        run: sleep 15
      
      - name: Run E2E tests
        env:
          TEST_POSTGRES_HOST: localhost
          TEST_POSTGRES_PORT: 5432
          TEST_NEO4J_URI: bolt://localhost:7687
          TEST_REDIS_HOST: localhost
          TEST_WEAVIATE_URL: http://localhost:8080
        run: |
          cd bob
          poetry run pytest tests/e2e -v --maxfail=3
      
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: e2e-test-logs
          path: bob/logs/

  # ============================================================================
  # Security Tests
  # ============================================================================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: |
          cd bob
          poetry install --with dev
      
      - name: Run security tests
        run: |
          cd bob
          poetry run pytest tests/security -v
      
      - name: Run Bandit security scan
        run: |
          cd bob
          poetry run bandit -r src/bob -f json -o bandit-report.json
        continue-on-error: true
      
      - name: Upload Bandit report
        uses: actions/upload-artifact@v3
        with:
          name: bandit-report
          path: bob/bandit-report.json

  # ============================================================================
  # Performance Tests
  # ============================================================================
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[perf]')
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: bob_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: bob_test
        ports:
          - 5432:5432
      
      neo4j:
        image: neo4j:5.13
        env:
          NEO4J_AUTH: neo4j/test_password
        ports:
          - 7687:7687
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
      
      weaviate:
        image: semitechnologies/weaviate:1.24.0
        env:
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
        ports:
          - 8080:8080
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: |
          cd bob
          poetry install --with dev
      
      - name: Wait for services
        run: sleep 15
      
      - name: Run performance tests
        env:
          TEST_POSTGRES_HOST: localhost
          TEST_NEO4J_URI: bolt://localhost:7687
          TEST_REDIS_HOST: localhost
          TEST_WEAVIATE_URL: http://localhost:8080
        run: |
          cd bob
          poetry run pytest tests/performance -v --tb=short
      
      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: bob/performance-results.json

  # ============================================================================
  # Code Quality
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: |
          cd bob
          poetry install --with dev
      
      - name: Run Black
        run: |
          cd bob
          poetry run black --check src/bob tests
      
      - name: Run isort
        run: |
          cd bob
          poetry run isort --check-only src/bob tests
      
      - name: Run Flake8
        run: |
          cd bob
          poetry run flake8 src/bob tests --max-line-length=100
      
      - name: Run MyPy
        run: |
          cd bob
          poetry run mypy src/bob
        continue-on-error: true

  # ============================================================================
  # Test Summary
  # ============================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, security-tests, code-quality]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "E2E Tests: ${{ needs.e2e-tests.result }}"
          echo "Security Tests: ${{ needs.security-tests.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"
      
      - name: Fail if any test failed
        if: |
          needs.unit-tests.result == 'failure' ||
          needs.integration-tests.result == 'failure' ||
          needs.e2e-tests.result == 'failure' ||
          needs.security-tests.result == 'failure' ||
          needs.code-quality.result == 'failure'
        run: exit 1

# Made with Bob