version: '3.8'

services:
  # Neo4j - Graph Database
  neo4j:
    image: neo4j:5.14-community
    container_name: bob-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/bobpassword123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p bobpassword123 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bob-network

  # Weaviate - Vector Database
  weaviate:
    image: semitechnologies/weaviate:1.24.0
    container_name: bob-weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=text2vec-openai
      - ENABLE_MODULES=text2vec-openai
      - CLUSTER_HOSTNAME=node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bob-network

  # PostgreSQL - Index Registry
  postgres:
    image: postgres:15-alpine
    container_name: bob-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=bob
      - POSTGRES_PASSWORD=bobpassword123
      - POSTGRES_DB=bob_registry
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bob -d bob_registry"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bob-network

  # Redis - Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: bob-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lfu
      --appendonly yes
      --requirepass bobpassword123
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "bobpassword123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bob-network

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: bob-jaeger
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"  # UI
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - bob-network

  # Prometheus - Metrics
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: bob-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - bob-network

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:10.2.2
    container_name: bob-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    networks:
      - bob-network

  # Bob API Service (Development)
  bob-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: bob-api
    ports:
      - "8000:8000"  # REST API
      - "50052:50052"  # gRPC
    environment:
      - ENVIRONMENT=development
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=bobpassword123
      - WEAVIATE_URL=http://weaviate:8080
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=bob
      - POSTGRES_PASSWORD=bobpassword123
      - POSTGRES_DB=bob_registry
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=bobpassword123
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - LOG_LEVEL=DEBUG
    volumes:
      - ../src:/app/src
      - ../tests:/app/tests
      - bob_workspace:/workspace
    depends_on:
      neo4j:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bob-network
    command: uvicorn bob.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  neo4j_data:
  neo4j_logs:
  weaviate_data:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  bob_workspace:

networks:
  bob-network:
    driver: bridge

# Made with Bob
