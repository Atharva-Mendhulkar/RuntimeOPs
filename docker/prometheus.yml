global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'bob-dev'
    environment: 'development'

scrape_configs:
  - job_name: 'bob-api'
    static_configs:
      - targets: ['bob-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:7474']
    metrics_path: '/metrics'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

# Made with Bob
