apiVersion: v1
kind: ConfigMap
metadata:
  name: runtimeops-agent-config
  namespace: default
  labels:
    app: runtimeops-agent
data:
  # Environment
  ENV: "production"
  LOG_LEVEL: "INFO"

  # Databases (adjust hosts as per cluster configuration)
  POSTGRES_HOST: "postgres.default.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "runtimeops_registry"
  POSTGRES_USER: "postgres_user"
  
  REDIS_HOST: "redis.default.svc.cluster.local"
  REDIS_PORT: "6379"

  NEO4J_URI: "bolt://neo4j.default.svc.cluster.local:7687"
  NEO4J_USER: "neo4j"

  WEAVIATE_URL: "http://weaviate.default.svc.cluster.local:8080"

  # Observability
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4318"
  PROMETHEUS_METRICS_PORT: "8000"
