apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibm-bob-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ibm-bob-api
  template:
    metadata:
      labels:
        app: ibm-bob-api
    spec:
      containers:
      - name: api
        image: ibm-bob-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: NEO4J_URI
          value: bolt://neo4j:7687
        - name: WEAVIATE_URL
          value: http://weaviate:8080
